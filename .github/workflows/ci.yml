name: CI/CD Pipeline

on:
  push:
    branches: [ feature-login ]
  pull_request:
    branches: [ main ]

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: ✅ Checkout code
        uses: actions/checkout@v3

      - name: ✅ Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: ✅ Install dependencies
        run: npm install

      - name: ✅ Run tests
        run: npm test

      - name: ✅ Run app
        run: node index.js

  deploy:
    runs-on: ubuntu-latest
    needs: build   # 🚀 runs ONLY if build is successful

    steps:
      - name: ✅ Simulate Deployment
        run: echo "Deploying application"
