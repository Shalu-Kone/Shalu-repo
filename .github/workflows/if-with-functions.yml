name: Nice If example

on:
  push:
    branches:
      - main
      - develop
      - feature/**

jobs: 
  quality_checks: 
    if: startsWith(github.ref_name, 'feature') && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps: 
      - name: Perform code quality checks
        run: echo "Performing code quality checks on the code"

  dev_deploy: 
    if: github.ref_name == 'develop' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps: 
      - name: Dev Deploy
        run: echo "Deploying the code to the development environment"

  prod_deploy: 
    if: github.ref_name == 'main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps: 
      - name: Prod Deploy
        run: echo "Deploying the code to the production environment"

  Success_notify: 
    needs: [quality_checks, dev_deploy, prod_deploy]
    if: always() && !failure()
    runs-on: ubuntu-latest
    steps: 
      - name: Notify Success
        run: echo "Notifying the team about the successful execution of the workflow"

  Failure_notify: 
    needs: [quality_checks, dev_deploy, prod_deploy]
    if: failure()
    runs-on: ubuntu-latest
    steps: 
      - name: Notify Failure
        run: echo "Notifying the team about the failure of the workflow"
